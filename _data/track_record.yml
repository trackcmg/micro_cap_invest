# ════════════════════════════════════════════════════════════
#  Track record público
#
#  Campos por posición:
#    name          nombre de la compañía
#    ticker        enlaza automáticamente con la tesis si existe
#                  (mismo ticker que el frontmatter de la tesis)
#    date          fecha de apertura (YYYY-MM-DD). Ordena la tabla.
#    price         precio de ENTRADA. Texto libre con símbolo de divisa.
#    sell_price    precio de VENTA. Vacío "" = posición abierta → muestra "—"
#    yahoo         símbolo en Yahoo Finance. Solo hace falta si NO coincide
#                  con `ticker` (p. ej. RNO → RNO.PA en Euronext París).
#    current_price OPCIONAL. Precio manual de reserva: solo se usa si la
#                  cotización en vivo falla. Normalmente déjalo vacío.
#
#  El PRECIO ACTUAL se descarga EN VIVO de Yahoo Finance (a través del
#  proxy de Apps Script configurado en _config.yml → price_proxy_url) y
#  el % vs. entrada se calcula y colorea solo. Las cotizaciones de
#  Londres llegan en peniques (GBp) y se convierten a libras
#  automáticamente.
#
#  ⚠ IMPORTANTE: usa la MISMA divisa y unidad que la cotización real en
#    `price` (£1.02, no 102p), o el porcentaje saldrá mal.
# ════════════════════════════════════════════════════════════
