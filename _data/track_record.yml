# ════════════════════════════════════════════════════════════
#  Track record público
#
#  Campos por posición:
#    name          nombre de la compañía
#    ticker        enlaza automáticamente con la tesis si existe
#                  (mismo ticker que el frontmatter de la tesis)
#    date          fecha de apertura (YYYY-MM-DD). Ordena la tabla.
#    price         precio de ENTRADA. Texto libre con símbolo de divisa.
#    sell_price    precio de VENTA. Vacío "" = posición abierta → muestra "—"
#    current_price precio ACTUAL. Vacío "" → muestra "—"
#                  El % de variación vs. entrada se calcula solo y se
#                  colorea (verde si sube, rojo si baja).
#
#  ⚠ IMPORTANTE: usa la MISMA divisa y unidad en price, sell_price y
#    current_price de una misma fila (no mezclar £1.02 con 102p), o el
#    porcentaje saldrá mal.
# ════════════════════════════════════════════════════════════
