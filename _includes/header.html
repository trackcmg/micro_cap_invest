<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-mark" src="{{ '/assets/img/logo-mark.png' | relative_url }}" alt="" width="32" height="32">
      <span class="brand-name">{{ site.title }}</span>
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Primary">
      <a href="{{ '/theses/' | relative_url }}" data-i18n="nav.theses" {% if page.url contains '/theses/' or page.collection %}aria-current="page"{% endif %}>Theses</a>
      <a href="{{ '/track-record/' | relative_url }}" data-i18n="nav.track" {% if page.url contains '/track-record/' %}aria-current="page"{% endif %}>Track record</a>
      <a href="{{ '/methodology/' | relative_url }}" data-i18n="nav.method" {% if page.url contains '/methodology/' %}aria-current="page"{% endif %}>Methodology</a>
      <a href="{{ '/about/' | relative_url }}" data-i18n="nav.about" {% if page.url contains '/about/' %}aria-current="page"{% endif %}>About</a>
    </nav>

    <div class="header-actions">
      <div class="lang-menu" data-lang-menu>
        <button type="button" class="lang-trigger" data-lang-toggle aria-expanded="false" aria-haspopup="true" aria-controls="lang-dropdown">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18z"/></svg>
          <span data-i18n="nav.language">Language</span>
          <svg class="lang-caret" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M2.5 4.5L6 8l3.5-3.5"/></svg>
        </button>
        <div class="lang-dropdown" id="lang-dropdown" role="menu" hidden>
          <button type="button" role="menuitem" class="lang-option" data-set-lang="en" lang="en">
            <span>English</span>
            <svg class="lang-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
          </button>
          <button type="button" role="menuitem" class="lang-option" data-set-lang="es" lang="es">
            <span>Español</span>
            <svg class="lang-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
          </button>
        </div>
      </div>
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button type="button" class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="site-nav" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>
</header>
