# ============================================================
#  _config.yml — Configuración del sitio
#  Los campos marcados con [EDITAR] son los que debes rellenar.
# ============================================================

# ── Identidad ────────────────────────────────────────────────
title: "MicroEquityResearch"              # Nombre público del sitio / tu marca
tagline: "Value investing in micro & nano caps"   # Subtítulo corto (inglés)
description: "Independent value research on overlooked micro and nano caps across AIM, TSXV and continental Europe. Written investment theses and a public track record."  # Meta description por defecto
author_name: "MicroEquityResearch"        # [EDITAR si prefieres tu nombre] Aparece en el © del footer

# ── URL del sitio ────────────────────────────────────────────
# Configurado para el repo de proyecto "micro_cap_invest":
#   https://trackcmg.github.io/micro_cap_invest/
# Si algún día usas dominio propio: url pasa a ser el dominio y
# baseurl se queda vacío ("").
url: "https://trackcmg.github.io"
baseurl: "/micro_cap_invest"

# ── Redes y contacto ─────────────────────────────────────────
substack_url: "https://YOURNAME.substack.com"   # [EDITAR]
twitter_url: "https://x.com/YOURHANDLE"         # [EDITAR]
twitter:
  username: YOURHANDLE                          # [EDITAR] sin @ (para Twitter cards)
  card: summary_large_image
email: ""                                       # [EDITAR] opcional; vacío = no se muestra

# ── Build (no suele hacer falta tocar nada de aquí abajo) ────
markdown: kramdown
kramdown:
  input: GFM
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  theses_en:
    output: true
    permalink: /thesis/:name/
  theses_es:
    output: true
    permalink: /tesis/:name/

defaults:
  - scope: { path: "" }
    values:
      image: /assets/img/og-default.png
  - scope: { path: "", type: theses_en }
    values:
      layout: thesis
      lang: en
  - scope: { path: "", type: theses_es }
    values:
      layout: thesis
      lang: es

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - CNAME.example
  - vendor
  - .claude
